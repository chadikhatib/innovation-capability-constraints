name: Reproducibility Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify data integrity
      run: |
        python -c "
        import pandas as pd
        df = pd.read_csv('data/Deidentified_Dataset_N303.csv')
        assert len(df) == 303, f'Expected 303 rows, got {len(df)}'
        assert 'PILS' in df.columns, 'PILS column missing'
        assert 'IAI' in df.columns, 'IAI column missing'
        assert 'IRS' in df.columns, 'IRS column missing'
        assert 'IPI' in df.columns, 'IPI column missing'
        print(f'✅ Data integrity verified: N={len(df)}, columns OK')
        "

    - name: Run analysis script
      run: |
        python code/Innovation_Capability_Analysis.py           --data data/Deidentified_Dataset_N303.csv           --output results/

    - name: Verify outputs
      run: |
        ls -la results/
        test -f results/S2_descriptive_stats.csv
        test -f results/S4_correlation_matrix.csv
        echo "✅ All outputs generated successfully"

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: analysis-results
        path: results/
